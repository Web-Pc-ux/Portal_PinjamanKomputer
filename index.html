<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link rel="stylesheet" href="login.css?v=1.1" />
</head>

<body>
    <div class="login-wrapper">
        <div class="login-container">
            <form id="loginForm" novalidate>
                <img src="Pictrure/Logo Digital UMS.png" alt="Logo Digital UMS"
                    class="logo" />
                <h2 data-i18n="portal_title">Portal Peminjaman Komputer</h2>
                <div class="input-group">
                    <label for="username" data-i18n="username_label">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter username" data-i18n="username_placeholder" />
                    <span class="error-message" id="usernameError"></span>
                </div>
                <div class="input-group">
                    <label for="password" data-i18n="password_label">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter password" data-i18n="password_placeholder" />
                    <span class="error-message" id="passwordError"></span>
                </div>
                <button type="submit" data-i18n="login_btn">Log In</button>

                <div class="divider">
                    <span data-i18n="or_divider">ATAU</span>
                </div>


                <button type="button" id="msBtn" class="btn-ms">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg" alt="Microsoft Logo">
                    <span data-i18n="ms_login">Log Masuk dengan Microsoft</span>
                </button>

                <button type="button" id="forgotBtn" class="link-button" data-i18n="forgot_pass">Lupa Kata Laluan?</button>

                <button type="button" id="borrowBtn" class="btn-secondary" data-i18n="borrow_form_btn">
                    <i class="fas fa-file-signature"></i> BORANG PERMOHONAN PEMINJAMAN
                </button>
            </form>
        </div>

        <footer class="login-footer" data-i18n="footer_text">
            © 2026 Jabatan Digital UMS , Unit Perkomputeraan. Hak Cipta Terpelihara.
        </footer>
    </div>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>
    
    <!-- MSAL.js for Microsoft Single-Tenant Support -->
    <script src="https://alcdn.msauth.net/browser/2.37.1/js/msal-browser.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="lang.js"></script>
    <script src="login.js?v=1.1"></script>
</body>

</html>
