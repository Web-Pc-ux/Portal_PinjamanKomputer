<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lupa Kata Laluan</title>
    <link rel="stylesheet" href="forgot.css" />
</head>

<body>

    <div class="container">
        <h2>Lupa Kata Laluan</h2>

        <label for="userid">Masukkan ID atau Email:</label><br />
        <input type="text" id="userid" placeholder="ID atau Email" autocomplete="off" />
        <button id="searchBtn">Cari</button>

        <div id="result" class="result"></div>

        <button id="requestBtn" style="display:none;">Request Forgot</button>
        <!-- Tambah Butang Kembali -->
        <button id="backBtn" style="margin-top:10px;">Kembali</button>
    </div>

    <footer id="forgotFooter"
        style="width: 100%; text-align: center; color: #64748b; font-size: 0.8rem; padding: 2rem 0; border-top: 1px solid #e2e8f0; margin-top: 2rem;">
        © 2026 Jabatan Digital UMS , Unit Perkomputeraan. Hak Cipta Terpelihara.
    </footer>

    <script src="forgot.js"></script>
    </script>


</body>

</html>
