<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Lupa Kata Laluan | Portal Peminjaman UMS</title>
    <link rel="stylesheet" href="forgot.css" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div class="forgot-container anim-fade-up">
        <img src="../Pictrure/Logo Digital UMS.png" alt="Logo Digital UMS"
            class="logo" />

        <h2>Lupa Kata Laluan</h2>
        <p class="subtitle">Sila masukkan ID Pengguna atau Email anda untuk mencari maklumat akaun.</p>

        <div class="input-group">
            <label for="userid"><i class="fas fa-user-circle"></i> ID Pengguna / Email</label>
            <input type="text" id="userid" placeholder="Cth: chris123" autocomplete="off" />
        </div>

        <div class="button-group">
            <button id="searchBtn" class="btn btn-primary">
                <i class="fas fa-search"></i> Cari Maklumat
            </button>
            <button id="backBtn" class="btn btn-outline">
                <i class="fas fa-arrow-left"></i> Kembali ke Login
            </button>
        </div>

        <div id="result" class="result"></div>
        <button id="requestBtn" class="btn btn-success" style="display:none; margin-top: 15px;">
            <i class="fas fa-paper-plane"></i> Mohon Set Semula
        </button>
    </div>

    <footer id="forgotFooter">
        © 2026 Jabatan Digital UMS , Unit Perkomputeraan. Hak Cipta Terpelihara.
    </footer>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <script src="forgot.js"></script>
</body>

</html>
